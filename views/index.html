<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Private Chat</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h2>Welcome to Private Chat</h2>

  <!-- Create New Account -->
  <form action="/createAccount" method="post">
    <h3>Create New Account</h3>
    <label for="newUsername">Username:</label>
    <input type="text" id="newUsername" name="username" required />
    <label for="newPassword">Password:</label>
    <input type="password" id="newPassword" name="password" required />
    <button type="submit">Create Account</button>
  </form>

  <!-- Login -->
  <form action="/login" method="post" id="loginForm">
    <h3>Login</h3>
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" required />
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required />
    <button type="submit">Login</button>
  </form>

  <!-- Chat Window -->
  <div id="chat" style="display:none;">
    <h3>Chat</h3>
    <div id="messages"></div>
    <form id="chatForm">
      <input type="text" id="message" placeholder="Type a message..." required />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="/socket.io/socket.io.js"></script>
<script>
  const chatDiv = document.getElementById("chat");
  const messagesDiv = document.getElementById("messages");
  const chatForm = document.getElementById("chatForm");
  const messageInput = document.getElementById("message");
  const loginForm = document.getElementById("loginForm");
  const isOperaMini = navigator.userAgent.includes("Opera Mini");

  let username = "";

  if (isOperaMini) {
    async function fetchMessages() {
      const response = await fetch("/fetchMessages");
      const messages = await response.json();

      messagesDiv.innerHTML = ""; // Clear previous messages
      messages.forEach(({ username, message }) => {
        const messageElement = document.createElement("p");
        messageElement.textContent = `${username}: ${message}`;
        messagesDiv.appendChild(messageElement);
      });

      setTimeout(fetchMessages, 5000); // Poll every 5 seconds
    }

    fetchMessages();

    chatForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (message) {
        await fetch("/sendMessage", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, message }),
        });
        messageInput.value = "";
      }
    });
  } else {
    const socket = io();

    chatForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const message = messageInput.value.trim();
      if (message) {
        socket.emit("message", { username, message });
        messageInput.value = "";
      }
    });

    socket.on("message", (data) => {
      const messageElement = document.createElement("p");
      messageElement.textContent = `${data.username}: ${data.message}`;
      messagesDiv.appendChild(messageElement);
    });
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    const response = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });

    if (response.ok) {
      alert("Login successful!");
      username = data.username;  // Store the username
      chatDiv.style.display = "block"; // Show chat window
      if (isOperaMini) fetchMessages();
    } else {
      const error = await response.text();
      alert(`Login failed: ${error}`);
    }
  });
</script>
</body>
</html>
